backend:
  name: github
  repo: rainxchzed/rainxchzed.github.io
  branch: main
  base_url: https://rainxchzedblog.rainxchzed.workers.dev

site_url: https://rainxchzed.dev

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: ["date", "title"]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: string, required: false }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - name: tags
        label: Tags
        widget: list
        required: false
        field: { name: tag, widget: string }
      - { name: draft, label: Draft, widget: boolean, default: false, required: false }
      - { name: body, label: Body, widget: markdown }
